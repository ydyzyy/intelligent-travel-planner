[pytest]
# 测试路径配置
testpaths = tests

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 详细输出
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 标记配置
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    api: API测试

# 最小Python版本
minversion = 7.0

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S
